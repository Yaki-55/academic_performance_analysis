version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: mi_postgres_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: x
      POSTGRES_DB: nes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
